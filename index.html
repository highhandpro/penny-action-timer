<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Penny Action Timer" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./action-icon.png" />
  <title>30 Second Penny Action Timer</title>
  <style>
    @font-face {
      font-family: "DSEG7";
      src: url("./DSEG7Classic-BoldItalic.ttf") format("truetype");
      font-weight: 700;
      font-style: italic;
      font-display: swap;
    }

    :root {
      --bg: #050505;
      --timer-green: #0f6f2a;
      --timer-red: #ff1f1f;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.7);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: radial-gradient(circle at top, #220606 0%, var(--bg) 60%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overscroll-behavior: none;
      touch-action: manipulation;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)),
        url("./pennyante-og.png") 72% 48% / clamp(460px, 115vmin, 1200px) no-repeat;
      opacity: 0.24;
      pointer-events: none;
      z-index: 0;
      filter: saturate(0.9) contrast(1.05);
      transform: rotate(180deg) rotate(35deg) scale(1.18) translateX(10vw);
      transform-origin: center center;
    }

    body {
      display: grid;
      place-items: center;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,0.18), rgba(0,0,0,0.32));
      pointer-events: none;
      z-index: 0;
    }

    .screen {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100dvh;
      display: grid;
      grid-template-rows: 1fr;
      padding:
        max(12px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        max(12px, env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      z-index: 1;
    }

    .stage {
      position: relative;
      min-height: 100%;
      overflow: hidden;
    }

    .timer-wrap {
      display: grid;
      place-items: center;
      text-align: center;
      transform: rotate(180deg);
      transform-origin: center center;
      position: relative;
      padding: clamp(20px, 5vw, 56px) clamp(18px, 4vw, 40px) clamp(120px, 16vh, 180px);
    }

    .timer {
      font-size: min(52vw, 60vh);
      line-height: 0.9;
      font-weight: 900;
      font-family: "DSEG7", "Courier New", monospace;
      color: var(--timer-color, var(--timer-green));
      letter-spacing: -0.1em;
      font-variant-numeric: tabular-nums;
      text-shadow:
        0 0 16px var(--timer-glow, rgba(15, 111, 42, 0.52)),
        0 0 42px var(--timer-glow, rgba(15, 111, 42, 0.25));
    }

    .mini-timer {
      position: fixed;
      font-family: "DSEG7", "Courier New", monospace;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      font-size: clamp(1.8rem, 4vw, 4rem);
      color: var(--timer-color, var(--timer-green));
      text-shadow:
        0 0 8px var(--timer-glow, rgba(15, 111, 42, 0.42)),
        0 0 18px var(--timer-glow, rgba(15, 111, 42, 0.18));
      opacity: 0.82;
      pointer-events: none;
      z-index: 1;
    }

    .mini-timer.top-left {
      top: 34px;
      left: 32px;
      transform: rotate(32deg);
    }

    .mini-timer.top-right {
      top: 34px;
      right: 34px;
      transform: rotate(-28deg);
    }

    .mini-timer.bottom-right {
      right: 28px;
      bottom: 132px;
      transform: rotate(180deg);
      font-size: clamp(1.4rem, 3vw, 2.8rem);
      opacity: 0.9;
    }

    .controls {
      position: fixed;
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: auto auto;
      gap: 4px;
      padding: 6px;
      background: rgba(0, 0, 0, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.035);
      border-radius: 18px;
      backdrop-filter: blur(8px);
      z-index: 2;
    }

    .add-btn {
      min-height: 24px;
      border: none;
      border-radius: 9px;
      padding: 0 6px;
      font-size: 0.66rem;
      font-weight: 900;
      color: #1b0909;
      background: linear-gradient(180deg, #ffcf5f, #ff8a1f);
      box-shadow: 0 12px 30px rgba(255, 138, 31, 0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .add-btn:disabled {
      opacity: 0.35;
      filter: grayscale(0.6);
      box-shadow: none;
    }

    .pause-btn {
      min-height: 24px;
      border: none;
      border-radius: 9px;
      padding: 0 7px;
      font-size: 0.66rem;
      font-weight: 900;
      color: white;
      background: linear-gradient(180deg, #444, #202020);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .pause-btn:disabled {
      opacity: 0.35;
      filter: grayscale(0.8);
      box-shadow: none;
    }

    .add-icon {
      width: 12px;
      height: 12px;
      display: block;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .flash {
      animation: flash 0.24s steps(1) infinite alternate;
    }

    .tap-overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      border: none;
      padding: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      min-height: 100%;
    }

    .timer-card {
      width: min(100%, 1180px);
      padding: clamp(8px, 2vw, 20px);
      border-radius: 24px;
      background: transparent;
    }

    .hint {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      bottom: max(58px, calc(env(safe-area-inset-bottom) + 44px));
      max-width: min(72vw, 720px);
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: rgba(255,255,255,0.84);
      font-size: clamp(15px, 2vw, 20px);
      font-weight: 800;
      letter-spacing: -0.01em;
      z-index: 2;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .countdown-sound {
      display: none;
    }

    @keyframes flash {
      from { background: radial-gradient(circle at top, #220606 0%, var(--bg) 60%); }
      to { background: radial-gradient(circle at top, #440707 0%, #120101 60%); }
    }
  </style>
</head>
<body>
  <main class="screen" id="screen" aria-label="Penny Action Timer. Tap anywhere to restart the 30 second countdown.">
    <button class="tap-overlay" id="tapArea" aria-label="Tap anywhere to restart the Penny Action Timer countdown"></button>
    <audio class="countdown-sound" id="countdownSound" preload="auto" playsinline webkit-playsinline src="./countdown-alert.mp3"></audio>
    <div class="mini-timer top-left" id="miniTimerTopLeft">30</div>
    <div class="mini-timer top-right" id="miniTimerTopRight">30</div>
    <div class="mini-timer bottom-right" id="miniTimerBottomRight">30</div>
    <div class="hint">Tap to start/reset</div>
    <div class="content">
      <div class="stage">
        <div class="timer-card">
          <div class="timer-wrap">
            <div class="timer" id="timer">30</div>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="pause-btn" id="pauseBtn" type="button">Pause</button>
      <button class="add-btn" id="add30" type="button">
        <img class="add-icon" src="./action-icon.png" alt="" aria-hidden="true" />
        <span>+30</span>
      </button>
    </div>
    <audio class="countdown-sound" id="voice10" preload="auto" playsinline webkit-playsinline src="./10.mp3"></audio>
    <audio class="countdown-sound" id="voice9" preload="auto" playsinline webkit-playsinline src="./9.mp3"></audio>
    <audio class="countdown-sound" id="voice8" preload="auto" playsinline webkit-playsinline src="./8.mp3"></audio>
    <audio class="countdown-sound" id="voice7" preload="auto" playsinline webkit-playsinline src="./7.mp3"></audio>
    <audio class="countdown-sound" id="voice6" preload="auto" playsinline webkit-playsinline src="./6.mp3"></audio>
    <audio class="countdown-sound" id="voice5" preload="auto" playsinline webkit-playsinline src="./5.mp3"></audio>
    <audio class="countdown-sound" id="voice4" preload="auto" playsinline webkit-playsinline src="./4.mp3"></audio>
    <audio class="countdown-sound" id="voice3" preload="auto" playsinline webkit-playsinline src="./3.mp3"></audio>
    <audio class="countdown-sound" id="voice2" preload="auto" playsinline webkit-playsinline src="./2.mp3"></audio>
    <audio class="countdown-sound" id="voice1" preload="auto" playsinline webkit-playsinline src="./1.mp3"></audio>
  </main>

  <script>
    (() => {
      const DURATION = 30;
      const screen = document.getElementById('screen');
      const tapArea = document.getElementById('tapArea');
      const timerEl = document.getElementById('timer');
      const countdownSound = document.getElementById('countdownSound');
      const voiceClips = {
        10: document.getElementById('voice10'),
        9: document.getElementById('voice9'),
        8: document.getElementById('voice8'),
        7: document.getElementById('voice7'),
        6: document.getElementById('voice6'),
        5: document.getElementById('voice5'),
        4: document.getElementById('voice4'),
        3: document.getElementById('voice3'),
        2: document.getElementById('voice2'),
        1: document.getElementById('voice1'),
      };
      const miniTimers = [
        document.getElementById('miniTimerTopLeft'),
        document.getElementById('miniTimerTopRight'),
        document.getElementById('miniTimerBottomRight'),
      ];
      const pauseBtn = document.getElementById('pauseBtn');
      const add30Btn = document.getElementById('add30');

      let remaining = DURATION;
      let running = false;
      let finished = false;
      let paused = false;
      let lastTick = performance.now();
      let lastSpokenSecond = null;
      let wakeLock = null;
      let audioUnlocked = false;

      function formatTime(seconds) {
        return Math.max(0, Math.ceil(seconds)).toString();
      }

      function playCountdownSound() {
        if (!countdownSound) return;
        countdownSound.currentTime = 0;
        countdownSound.play().catch(() => {});
      }

      function playVoiceCountdown(second) {
        const clip = voiceClips[second];
        if (!clip) return;
        clip.currentTime = 0;
        clip.play().catch(() => {});
      }

      function playFinalAlarm() {
        if (!countdownSound) return;
        const beeps = [0, 260, 520];
        beeps.forEach((delay) => {
          window.setTimeout(() => {
            const clip = countdownSound.cloneNode(true);
            clip.volume = 1;
            clip.play().catch(() => {});
          }, delay);
        });
      }

      async function unlockAudio() {
        if (audioUnlocked) return;
        const clips = [countdownSound, ...Object.values(voiceClips)].filter(Boolean);
        for (const clip of clips) {
          try {
            clip.muted = true;
            clip.currentTime = 0;
            await clip.play();
            clip.pause();
            clip.currentTime = 0;
          } catch {
            // Ignore unlock failures and keep trying other clips.
          } finally {
            clip.muted = false;
          }
        }
        audioUnlocked = true;
      }

      async function requestWakeLock() {
        if (!('wakeLock' in navigator) || document.visibilityState !== 'visible') return;
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => {
            wakeLock = null;
          }, { once: true });
        } catch {
          wakeLock = null;
        }
      }

      function releaseWakeLock() {
        if (!wakeLock) return;
        wakeLock.release().catch(() => {});
        wakeLock = null;
      }

      function applyTimerColors() {
        const warningMode = remaining <= 10 && !finished;
        timerEl.style.setProperty('--timer-color', warningMode ? 'var(--timer-red)' : 'var(--timer-green)');
        timerEl.style.setProperty('--timer-glow', warningMode ? 'rgba(255, 31, 31, 0.55)' : 'rgba(15, 111, 42, 0.52)');
        miniTimers.forEach((mini) => {
          mini.style.setProperty('--timer-color', warningMode ? 'var(--timer-red)' : 'var(--timer-green)');
          mini.style.setProperty('--timer-glow', warningMode ? 'rgba(255, 31, 31, 0.45)' : 'rgba(15, 111, 42, 0.4)');
        });
      }

      function render() {
        const displayValue = formatTime(remaining);
        timerEl.textContent = displayValue;
        miniTimers.forEach((mini) => {
          mini.textContent = displayValue;
        });
        applyTimerColors();
        pauseBtn.disabled = !running;
        pauseBtn.textContent = paused ? 'Paused' : 'Pause';
        add30Btn.disabled = finished;
        screen.classList.toggle('flash', finished);
      }

      function addThirty() {
        if (finished) return;
        remaining += 30;
        lastSpokenSecond = null;
        render();
      }

      async function restart() {
        running = true;
        finished = false;
        paused = false;
        remaining = DURATION;
        lastTick = performance.now();
        lastSpokenSecond = null;
        await unlockAudio();
        await requestWakeLock();
        render();
      }

      function pauseTimer() {
        if (!running) return;
        running = false;
        paused = true;
        releaseWakeLock();
        render();
      }

      function tick(time) {
        if (running) {
          const delta = (time - lastTick) / 1000;
          remaining = Math.max(0, remaining - delta);
          lastTick = time;
          const currentSecond = Math.ceil(remaining);
          const displayValue = formatTime(remaining);
          timerEl.textContent = displayValue;
          miniTimers.forEach((mini) => {
            mini.textContent = displayValue;
          });
          applyTimerColors();
          if (currentSecond <= 10 && currentSecond > 0 && currentSecond !== lastSpokenSecond) {
            lastSpokenSecond = currentSecond;
            playVoiceCountdown(currentSecond);
          }
          if (remaining === 0) {
            running = false;
            finished = true;
            lastSpokenSecond = null;
            releaseWakeLock();
            playFinalAlarm();
            render();
          } else {
            timerEl.textContent = formatTime(remaining);
          }
        }
        requestAnimationFrame(tick);
      }

      tapArea.addEventListener('click', restart);
      screen.addEventListener('click', restart);
      pauseBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        pauseTimer();
      });
      add30Btn.addEventListener('click', (event) => {
        event.stopPropagation();
        addThirty();
      });
      window.addEventListener('keydown', (event) => {
        if (event.code === 'Space' || event.key === 'Enter') {
          event.preventDefault();
          restart();
        } else if (event.key.toLowerCase() === 'p') {
          pauseTimer();
        } else if (event.key === '+') {
          addThirty();
        }
      });

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && running) {
          requestWakeLock();
        }
      });

      render();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
